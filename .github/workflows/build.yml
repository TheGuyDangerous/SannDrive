name: build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: 3.24.3

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze

  android:
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --debug --split-per-abi
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: build/app/outputs/flutter-apk/app-*-debug.apk
          if-no-files-found: error

  windows:
    needs: analyze
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Package Windows build
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath SannDrive-windows-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: SannDrive-windows-x64.zip
          if-no-files-found: error

  release:
    needs: [android, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Publish rolling build
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest dist/android/*.apk dist/windows/*.zip \
            --prerelease --target "${GITHUB_SHA}" \
            --title "Latest build" \
            --notes "Automatic build from ${GITHUB_SHA} on ${GITHUB_REF_NAME}. Android debug APKs (per ABI) and a portable Windows x64 zip. A signed installer will replace the zip in a later milestone."
